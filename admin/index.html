<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h1>Admin Panel</h1>

<h2>Deposits</h2>
<table border="1" id="depositTable">
  <thead>
    <tr>
      <th>ID</th>
      <th>User</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<h2>Withdrawals</h2>
<table border="1" id="withdrawTable">
  <thead>
    <tr>
      <th>ID</th>
      <th>User</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>

const FUNCTION_URL = "https://ywnpzjjpighjhhqoxtsj.supabase.co/functions/v1/admin-api";

// ⚠️ PUT YOUR VALUES HERE
const ADMIN_SECRET = "Driver112#";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3bnB6ampwaWdoamhocW94dHNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mjc4OTUsImV4cCI6MjA5MzEwMzg5NX0.lfeKjFfNsCoy1UaQ0ASIUD08fUq8mhY-1gbMPzrjYDE";

// LOAD DATA
async function loadData() {
  try {
    console.log("Loading admin data...");

    const res = await fetch(FUNCTION_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-admin-secret": ADMIN_SECRET,
        "Authorization": "Bearer " + ANON_KEY
      },
      body: JSON.stringify({ action: "get_data" })
    });

    const data = await res.json();

    renderDeposits(data.deposits || []);
    renderWithdrawals(data.withdrawals || []);

  } catch (err) {
    console.error(err);
    alert("Failed to load admin data");
  }
}

// RENDER DEPOSITS
function renderDeposits(deposits) {
  const tbody = document.querySelector("#depositTable tbody");
  tbody.innerHTML = "";

  deposits.forEach(d => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${d.id}</td>
      <td>${d.user_id}</td>
      <td>$${d.amount}</td>
      <td>${d.status}</td>
      <td>
        ${d.status === "pending"
          ? `<button onclick="approveDeposit(${d.id})">Approve</button>`
          : "Done"}
      </td>
    `;

    tbody.appendChild(tr);
  });
}

// RENDER WITHDRAWALS
function renderWithdrawals(withdrawals) {
  const tbody = document.querySelector("#withdrawTable tbody");
  tbody.innerHTML = "";

  withdrawals.forEach(w => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${w.id}</td>
      <td>${w.user_id}</td>
      <td>$${w.amount}</td>
      <td>${w.status}</td>
      <td>
        ${w.status === "pending"
          ? `<button onclick="approveWithdrawal(${w.id})">Approve</button>`
          : "Done"}
      </td>
    `;

    tbody.appendChild(tr);
  });
}

// APPROVE DEPOSIT
async function approveDeposit(id) {
  await fetch(FUNCTION_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-secret": ADMIN_SECRET,
      "Authorization": "Bearer " + ANON_KEY
    },
    body: JSON.stringify({
      action: "approve_deposit",
      deposit_id: id
    })
  });

  loadData();
}

// APPROVE WITHDRAWAL
async function approveWithdrawal(id) {
  await fetch(FUNCTION_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-secret": ADMIN_SECRET,
      "Authorization": "Bearer " + ANON_KEY
    },
    body: JSON.stringify({
      action: "approve_withdrawal",
      withdrawal_id: id
    })
  });

  loadData();
}

// INIT
loadData();

</script>

</body>
</html>
